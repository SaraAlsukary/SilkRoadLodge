version: '3.8'

services:
  # واجهة React الخاصة بـ Silk
  frontend:
    build: ./front
    ports:
      - "8080:80" # تم تغيير المنفذ الخارجي إلى 8080 ليتحدث معه الموجه المحايد داخلياً
    depends_on:
      - backend

  # خلفية Laravel الخاصة بـ Silk
  backend:
    build: ./back
    volumes:
      - ./back:/var/www
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db

  # قاعدة بيانات Silk
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: your_secure_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: