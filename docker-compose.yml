version: '3.8'

services:
  # 1️⃣ الموقع الرئيسي للعملاء
  frontend:
    build: ./front
    volumes:
      # تم حذف ربط ملفات الفرونت إند لأن Dockerfile سيقوم ببنائها وحفظها داخلياً
      - ./back:/var/www
      - ./back/storage/app/public:/var/www/html/public/storage
    depends_on:
      - backend
    networks:
      - default
      - proxy_network

  # 2️⃣ واجهة لوحة التحكم
  dashboard:
    build: ./dashboard
    volumes:
      # تم حذف ربط ملفات لوحة التحكم لأن Dockerfile سيقوم ببنائها داخلياً
      - ./back:/var/www
      - ./back/storage/app/public:/var/www/html/public/storage
    depends_on:
      - backend
    networks:
      - default
      - proxy_network

  # 3️⃣ خلفية Laravel 
  backend:
    build: ./back
    volumes:
      - ./back:/var/www
      - /var/www/vendor
      - ./back/storage/app/public:/var/www/html/public/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db
    networks:
      - default
      - proxy_network

  # 4️⃣ قاعدة البيانات
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: silk_db
      MYSQL_ROOT_PASSWORD: root_2424
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default

  # 5️⃣ أداة phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_2424
    depends_on:
      - db
    networks:
      - default
      - proxy_network

volumes:
  db_data:

networks:
  default:
  proxy_network:
    external: true
    name: global-proxy_default