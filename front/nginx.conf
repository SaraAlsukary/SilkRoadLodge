# السيرفر الرئيسي لتشغيل موقعك (بدون www)
server {
    listen 80;
    server_name silkroadlodge.com; 

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# سيرفر فرعي لتحويل من يكتب www إلى الدومين المباشر
server {
    listen 80;
    server_name www.silkroadlodge.com;
    return 301 http://silkroadlodge.com$request_uri;
}