# 1. تحويل أي طلب يأتي عبر HTTP العادي (سواء بـ www أو بدونها) إلى HTTPS النظيف وبدون www
server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;
    return 301 https://silkroadlodge.com$request_uri;
}

# 2. تحويل طلبات HTTPS التي تحتوي على www إلى HTTPS النظيف وبدون www
server {
    listen 443 ssl;
    server_name www.silkroadlodge.com;

    # شهادات الأمان ضرورية هنا أيضاً لضمان نجاح التحويل دون تحذيرات
    ssl_certificate /etc/letsencrypt/live/silkroadlodge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkroadlodge.com/privkey.pem;

    return 301 https://silkroadlodge.com$request_uri;
}

# 3. السيرفر الرئيسي والمستقر للموقع (بدون www ومشفر بالكامل)
server {
    listen 443 ssl;
    server_name silkroadlodge.com;

    # مسارات شهادة الأمان داخل الحاوية
    ssl_certificate /etc/letsencrypt/live/silkroadlodge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkroadlodge.com/privkey.pem;

    # إعدادات الحماية والتشفير القياسية
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}