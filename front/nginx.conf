server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;

    root /usr/share/nginx/html;
    index index.html index.php;

    # 1. تشغيل واجهة الـ React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. تمرير طلبات الـ API إلى index.php مباشرة ليتعامل معها لارافيل بذكاء
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }
# 3. نفق الـ FastCGI المحدث بالكامل
    location ~ \.php$ {
        root /var/www/public; # 👈 إعلام Nginx بمكان المجلد المشترك
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # ربط دقيق بملف التشغيل مع تمرير المسار البرمجي الأصلي
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # ⚠️ الأسطر السحرية لحل الـ 404 (تخبر لارافيل بالرابط المطلوب بدقة)
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }
}