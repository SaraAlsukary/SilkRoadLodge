server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;

    root /usr/share/nginx/html;
    index index.html;

    # 1. تشغيل واجهة الـ React (Vite Build)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. إعادة توجيه طلبات الـ API بالكامل إلى حاوية الباك إند بنظام التمرير النظيف
    location /api/ {
        proxy_pass http://backend:9000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # إعدادات إضافية لضمان عدم حدوث قطع في الاتصال بالباك إند
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}