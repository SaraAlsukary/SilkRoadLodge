# 1. تحويل أي طلب يأتي عبر HTTP العادي (سواء بـ www أو بدونها) إلى HTTPS النظيف وبدون www
server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;
    return 301 https://silkroadlodge.com$request_uri;
}

# 2. تحويل طلبات HTTPS التي تحتوي على www إلى HTTPS النظيف وبدون www
server {
    listen 443 ssl;
    server_name www.silkroadlodge.com;

    # شهادات الأمان ضرورية هنا أيضاً لضمان نجاح التحويل دون تحذيرات
    ssl_certificate /etc/letsencrypt/live/silkroadlodge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkroadlodge.com/privkey.pem;

    return 301 https://silkroadlodge.com$request_uri;
}

# 3. السيرفر الرئيسي والمستقر للموقع (بدون www ومشفر بالكامل)
server {
    listen 443 ssl;
    server_name silkroadlodge.com;

    # مسارات شهادة الأمان داخل الحاوية
    ssl_certificate /etc/letsencrypt/live/silkroadlodge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkroadlodge.com/privkey.pem;

    # إعدادات الحماية والتشفير القياسية
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# إعدادات موقع الأكاديمية اليابانية (توجيه الواجهة إلى Vercel)
# ==========================================
server {
    listen 80;
    server_name japaneseacademy.jp www.japaneseacademy.jp;
    return 301 https://japaneseacademy.jp$request_uri;
}

server {
    listen 443 ssl;
    server_name japaneseacademy.jp www.japaneseacademy.jp;

    # استخدام شهادة Silk مؤقتاً لضمان إقلاع السيرفر بنجاح حتى تكتمل إعدادات الـ DNS للدومين الآخر
    ssl_certificate /etc/letsencrypt/live/silkroadlodge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silkroadlodge.com/privkey.pem;

    location / {
        proxy_pass https://japanese-academy.vercel.app;
        proxy_set_header Host $host;
        proxy_ssl_server_name on;
    }
}

# ==========================================
# إعدادات الـ API الخاص بالأكاديمية (api.japaneseacademy.jp)
# ==========================================
server {
    listen 80;
    server_name api.japaneseacademy.jp;
    return 301 https://$host$request_uri;
}
# ==========================================
# إعدادات الـ API الخاص بالأكاديمية (api.japaneseacademy.jp)
# ==========================================
server {
    listen 443 ssl;
    server_name api.japaneseacademy.jp;

    ssl_certificate /etc/letsencrypt/live/api.japaneseacademy.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.japaneseacademy.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/Japanese-Academy-Backend/public;
    index index.php;

    location / {
        # 1. التعامل مع طلب الفحص المبدئي (OPTIONS) الذي يرسله المتصفح قبل الـ POST
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://japaneseacademy.jp' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # 2. إضافة الترويسات للطلبات الفعلية مثل الـ POST والـ GET
        add_header 'Access-Control-Allow-Origin' 'https://japaneseacademy.jp' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}