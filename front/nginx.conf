server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;

    root /usr/share/nginx/html;
    index index.html index.php;

    # 1. تشغيل واجهة الـ React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. تمرير طلبات الـ API إلى index.php مباشرة ليتعامل معها لارافيل بذكاء
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 📂 2.5 توجيه طلبات الصور إلى مجلد الباك إند ومنع سقوطها في الـ React
    location /storage/ {
        root /var/www/public; # تأكدي أن هذا هو المجلد المشترك للباك إند داخل الحاوية
        try_files $uri =404;
        access_log off;
        log_not_found off;
        expires max;
    }

    # 3. نفق الـ FastCGI المحدث بالكامل
    location ~ \.php$ {
        root /var/www/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }
    
}
