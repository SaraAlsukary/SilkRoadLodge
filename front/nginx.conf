server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;

    root /usr/share/nginx/html;
    index index.html;

    # 1. تشغيل واجهة الـ React (Vite)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. توجيه طلبات الـ API داخلياً ليتم معالجتها عبر الـ PHP
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 3. نفق العبور البرمجي (FastCGI) المتوافق مع حاوية الباك إند (FPM 9000)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # نداء الحاوية باسمها والمنفذ الافتراضي لـ php-fpm
        fastcgi_pass backend:9000; 
        fastcgi_index index.php;
        include fastcgi_params;
        
        # ⚠️ ملاحظة: /var/www هو الـ WORKDIR المحدد داخل الـ Dockerfile الخاص بكِ
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # إعدادات إضافية لمنع الـ Timeout أثناء معالجة البيانات الضخمة
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
    }
}