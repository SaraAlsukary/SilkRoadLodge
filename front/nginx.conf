server {
    listen 80;
    server_name silkroadlodge.com www.silkroadlodge.com;

    root /usr/share/nginx/html;
    index index.html;

    # 1. تشغيل واجهة الـ React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. تمرير طلبات الـ API إلى حاوية الـ backend بنظام fastcgi المتوافق مع المنفذ 9000
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000; # 👈 يوجه مباشرة للمنفذ 9000 بلغة fastcgi الصحيحة
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}